appId: app.maypole.maypole
name: Mobile place picker selects only real visible Google POIs
---
# Purpose:
# - Verify blank-looking map taps do not select hidden places.
# - Verify tapping near the real Google Maps POI label/icon for "The Studio Museum in Harlem"
#   selects that already-visible Google-rendered POI.
# - This flow intentionally does not use the search bar to position or select the POI.
# - Run on a real Android device/emulator with a signed-in Maypole account, or provide
#   MAESTRO_EMAIL and MAESTRO_PASSWORD to log in when the login screen appears.
#
# Recommended usage:
#   maestro test .maestro/mobile_place_picker_visible_poi.yaml \
#     -e MAESTRO_EMAIL='you@example.com' \
#     -e MAESTRO_PASSWORD='your-password'
#
# Use single quotes for credentials in Fish/Bash/Zsh, especially when the
# password contains characters such as `$` that shells expand in double quotes.
#
# Coordinates are device/map-position dependent. The defaults assume the picker
# opens with The Studio Museum in Harlem already visible. Override these if the
# screenshot shows the blank area or POI label/icon at a different point:
#   -e BLANK_MAP_TAP='50%,62%'
#   -e STUDIO_MUSEUM_POI_TAP='46%,41%'

- launchApp:
    clearState: false

# Login only when the app starts unauthenticated.
- runFlow:
    when:
      visible: Email
    commands:
      - tapOn: Email
      - inputText: ${MAESTRO_EMAIL}
      - tapOn: Password
      - inputText: ${MAESTRO_PASSWORD}
      - hideKeyboard
      # hideKeyboard is unreliable on iOS and can leave the keyboard covering
      # the Sign In button. Tapping the keyboard's "done" key reliably dismisses
      # it on iOS; it is optional so Android (which has no such key) is unaffected.
      - tapOn:
          text: done
          optional: true
      - waitForAnimationToEnd
      - tapOn: Sign In
      - extendedWaitUntil:
          notVisible: Sign In
          timeout: 20000

# Open the mobile place picker from Home.
- extendedWaitUntil:
    visible: Search Places
    timeout: 20000
- tapOn: Search Places

# Wait for the map to load in its natural starting position. Do not use search.
- extendedWaitUntil:
    visible: Search for a maypole
    timeout: 20000
# Google map tiles can take ~20s to render on a fresh launch. The pulsing
# current-location dot keeps the screen animating, so this waits the full
# timeout, giving tiles and POI labels time to appear before we tap.
- waitForAnimationToEnd:
    timeout: 20000
- takeScreenshot: place-picker-initial-map

# Repeatedly tap an area that should not correspond to a visible Google POI label/icon.
# Adjust BLANK_MAP_TAP if the screenshot shows a visible POI at this point.
- tapOn:
    point: ${BLANK_MAP_TAP || '50%,62%'}
- waitForAnimationToEnd
- takeScreenshot: place-picker-after-blank-tap-1
- assertNotVisible: Chat Here

- tapOn:
    point: ${BLANK_MAP_TAP || '50%,62%'}
- waitForAnimationToEnd
- takeScreenshot: place-picker-after-blank-tap-2
- assertNotVisible: Chat Here

- tapOn:
    point: ${BLANK_MAP_TAP || '50%,62%'}
- waitForAnimationToEnd
- takeScreenshot: place-picker-after-blank-tap-3
- assertNotVisible: Chat Here

# Positive assertion: tap near the already-visible Google Maps POI label/icon for
# The Studio Museum in Harlem. This must be a native Google Maps POI tap, not a
# search result or app-rendered marker.
- tapOn:
    point: ${STUDIO_MUSEUM_POI_TAP || '46%,41%'}
- waitForAnimationToEnd
- takeScreenshot: place-picker-after-studio-museum-poi-tap
# The selection bottom sheet slides up with an animation, so wait for the POI
# name to appear rather than asserting instantly (avoids a race with the sheet
# transition and the pulsing current-location dot).
#
# The sheet exposes the POI title and its street address as a single merged
# accessibility node (e.g. "The Studio Museum in Harlem\n144 W 125th St, ...").
# Maestro matches text as a full-string regex, so we wrap the name in a DOTALL
# (?s).* pattern to match the combined multi-line node.
- extendedWaitUntil:
    visible:
      text: "(?s).*The Studio Museum in Harlem.*"
    timeout: 20000
- assertVisible: Chat Here

<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Maypole is a place-based messaging app for live local conversations at campuses, venues, neighborhoods, and events.">
  <meta name="keywords" content="local chat, place-based messaging, live venue chat, campus chat, neighborhood conversations, event messaging">
  <meta property="og:title" content="Maypole - Live Local Chat for Real Places">
  <meta property="og:description" content="Join real-time conversations tied to the places around you, from campuses and neighborhoods to venues and events.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Maypole">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Maypole - Live Local Chat for Real Places">
  <meta name="twitter:description" content="Join real-time conversations tied to campuses, neighborhoods, venues, and events.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Maypole">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.ico"/>

  <title>Maypole - Live Local Chat for Real Places</title>
  <link rel="manifest" href="manifest.json">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Maypole",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "Place-based messaging for live local conversations at campuses, neighborhoods, venues, and events.",
      "url": "https://maypole.app"
    }
  </script>
  
  <!-- Google Maps JavaScript API (required for google_maps_flutter_web) -->
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCZk6orOey1NyYBXW9PsM3AwE3bQHFbmlg&loading=async"></script>
</head>
<body>
  <!-- Splash screen while Flutter loads -->
  <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1A1A2E;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      #splash-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #1A1A2E;
      }

      #splash-logo {
        max-width: 60%;
        max-height: 60%;
        object-fit: contain;
      }

      /* Hide splash screen once Flutter is loaded */
      .flutter-loaded #splash-screen {
        display: none;
      }
  </style>

  <div id="splash-screen">
      <img id="splash-logo" src="icons/ic_logo_splash.png" alt="Maypole">
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
      window.addEventListener('flutter-first-frame', function () {
        document.body.classList.add('flutter-loaded');
      });
  </script>
</body>
</html>

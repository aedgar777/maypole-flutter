# Keep heap + metaspace well under the 16 GB CI runner limit. The previous
# -Xmx8G + 4G metaspace (~12 GB reserved) left no headroom for native (CMake/NDK),
# Kotlin and Dart compilation, causing the runner to be terminated (SIGTERM / exit 143).
org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Cache build outputs across runs for faster, more reliable builds.
org.gradle.caching=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
